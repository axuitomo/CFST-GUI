apply plugin: 'com.android.application'

def releaseKeystore = System.getenv("CFST_ANDROID_KEYSTORE")
def releaseKeystorePassword = System.getenv("CFST_ANDROID_KEYSTORE_PASSWORD")
def releaseKeyAlias = System.getenv("CFST_ANDROID_KEY_ALIAS")
def releaseKeyPassword = System.getenv("CFST_ANDROID_KEY_PASSWORD")
def cfstVersionEnv = System.getenv("CFST_VERSION")
def cfstVersionName = (cfstVersionEnv == null || cfstVersionEnv.trim().isEmpty()) ? "1.7.3" : cfstVersionEnv.trim()
if (cfstVersionName.startsWith("v")) {
    cfstVersionName = cfstVersionName.substring(1)
}
def cfstAndroidVersionCodeEnv = System.getenv("CFST_ANDROID_VERSION_CODE")
def cfstAndroidVersionCode = (cfstAndroidVersionCodeEnv == null || cfstAndroidVersionCodeEnv.trim().isEmpty()) ? 10703 : cfstAndroidVersionCodeEnv.trim().toInteger()
def missingReleaseSigningEnv = [
    "CFST_ANDROID_KEYSTORE": releaseKeystore,
    "CFST_ANDROID_KEYSTORE_PASSWORD": releaseKeystorePassword,
    "CFST_ANDROID_KEY_ALIAS": releaseKeyAlias,
    "CFST_ANDROID_KEY_PASSWORD": releaseKeyPassword,
].findAll { it.value == null || it.value.trim().isEmpty() }.keySet()

android {
    namespace = "io.github.axuitomo.cfstgui"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId = "io.github.axuitomo.cfstgui"
        minSdk = rootProject.ext.minSdkVersion
        targetSdk = rootProject.ext.targetSdkVersion
        versionCode = cfstAndroidVersionCode
        versionName = cfstVersionName
        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (missingReleaseSigningEnv.isEmpty()) {
                storeFile file(releaseKeystore)
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled = false
            if (missingReleaseSigningEnv.isEmpty()) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    splits {
        abi {
            enable = true
            reset()
            include 'arm64-v8a', 'armeabi-v7a'
            universalApk = true
        }
    }
    packaging {
        jniLibs {
            keepDebugSymbols += ['**/libgojni.so']
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    def requiresReleaseSigning = graph.allTasks.any { task ->
        task.path.toLowerCase().contains("release")
    }
    if (requiresReleaseSigning && !missingReleaseSigningEnv.isEmpty()) {
        throw new GradleException("Android Release 签名缺少环境变量：" + missingReleaseSigningEnv.join("、"))
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation files('libs/mobileapi.aar')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.documentfile:documentfile:$androidxDocumentFileVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
