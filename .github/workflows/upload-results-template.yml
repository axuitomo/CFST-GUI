name: Process Uploaded Results

on:
  push:
    paths:
      - "cfst-results/**/*.csv"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate CSV files and generate latest.json
        shell: bash
        run: |
          node <<'EOF'
          const fs = require("fs");
          const path = require("path");

          function walk(dir) {
            if (!fs.existsSync(dir)) return [];
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            const files = [];
            for (const entry of entries) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) files.push(...walk(full));
              else if (entry.isFile() && entry.name.endsWith(".csv")) files.push(full);
            }
            return files;
          }

          function parseCSVLine(line) {
            const result = [];
            let current = "";
            let quoted = false;
            for (let i = 0; i < line.length; i++) {
              const ch = line[i];
              if (ch === '"') {
                if (quoted && line[i + 1] === '"') {
                  current += '"';
                  i++;
                } else {
                  quoted = !quoted;
                }
                continue;
              }
              if (ch === "," && !quoted) {
                result.push(current);
                current = "";
                continue;
              }
              current += ch;
            }
            result.push(current);
            return result;
          }

          const files = walk("cfst-results");
          if (files.length === 0) {
            console.error("No CSV files found under cfst-results/");
            process.exit(1);
          }

          const requiredHeaders = ["IP 地址", "TCP延迟(ms)", "平均速率(MB/s)", "地区码"];
          const validated = [];

          for (const file of files) {
            const raw = fs.readFileSync(file, "utf8").replace(/^\uFEFF/, "");
            if (!raw.trim()) {
              console.error(`CSV file is empty: ${file}`);
              process.exit(1);
            }
            const lines = raw.split(/\r?\n/).filter((line) => line.trim().length > 0);
            if (lines.length === 0) {
              console.error(`CSV file has no rows: ${file}`);
              process.exit(1);
            }
            const header = parseCSVLine(lines[0]);
            for (const required of requiredHeaders) {
              if (!header.includes(required)) {
                console.error(`CSV file missing required header "${required}": ${file}`);
                process.exit(1);
              }
            }
            validated.push({ file, header, lines });
          }

          const normalized = validated.map((entry) => ({
            ...entry,
            relative: entry.file.split(path.sep).join("/"),
          }));
          normalized.sort((a, b) => b.relative.localeCompare(a.relative));
          const latest = normalized[0];
          const headerIndex = Object.fromEntries(latest.header.map((value, index) => [value, index]));
          const rows = latest.lines.slice(1).map(parseCSVLine).filter((row) => row[0] && row[0].trim());
          const topRows = rows.slice(0, 10).map((row) => ({
            ip: row[headerIndex["IP 地址"]] || "",
            colo: row[headerIndex["地区码"]] || "",
            tcp_latency_ms: row[headerIndex["TCP延迟(ms)"]] || "",
            download_mbps: row[headerIndex["平均速率(MB/s)"]] || "",
            trace_latency_ms: headerIndex["追踪延迟(ms)"] !== undefined ? row[headerIndex["追踪延迟(ms)"]] || "" : "",
          }));

          const outputDir = "cfst-results";
          fs.mkdirSync(outputDir, { recursive: true });
          fs.writeFileSync(
            path.join(outputDir, "latest.json"),
            JSON.stringify(
              {
                path: latest.relative,
                generated_at: new Date().toISOString(),
                row_count: rows.length,
                top_rows: topRows,
              },
              null,
              2
            ) + "\n"
          );
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `Latest CSV: \`${latest.relative}\`\n\nRows: ${rows.length}\n`);
          EOF

      - name: Upload latest.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfst-results-latest-json
          path: cfst-results/latest.json
          if-no-files-found: error
