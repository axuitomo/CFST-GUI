name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        default: "1.0"

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            os: windows-latest
            asset: build/release/desktop/cfst-gui-windows-amd64.exe
          - target: linux
            os: ubuntu-latest
            asset: build/release/desktop/cfst-gui-linux-amd64.tar.gz
          - target: darwin-amd64
            os: macos-15-intel
            asset: build/release/desktop/cfst-gui-darwin-amd64.app.zip
          - target: darwin-arm64
            os: macos-15
            asset: build/release/desktop/cfst-gui-darwin-arm64.app.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build desktop asset
        shell: bash
        env:
          CFST_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          VERSION="${CFST_VERSION#v}"
          export CFST_VERSION="$VERSION"
          ./scripts/build-release.sh "${{ matrix.target }}"

      - name: Upload desktop asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260410095206-2cfb76559b7b
          gomobile init

      - name: Decode Android keystore
        env:
          CFST_ANDROID_KEYSTORE_BASE64: ${{ secrets.CFST_ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$CFST_ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing CFST_ANDROID_KEYSTORE_BASE64" >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/cfst-android"
          echo "$CFST_ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/cfst-android/release.jks"

      - name: Build Android asset
        env:
          CFST_VERSION: ${{ github.event.inputs.version || github.ref_name }}
          CFST_ANDROID_KEYSTORE: ${{ runner.temp }}/cfst-android/release.jks
          CFST_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.CFST_ANDROID_KEYSTORE_PASSWORD }}
          CFST_ANDROID_KEY_ALIAS: ${{ secrets.CFST_ANDROID_KEY_ALIAS }}
          CFST_ANDROID_KEY_PASSWORD: ${{ secrets.CFST_ANDROID_KEY_PASSWORD }}
        run: |
          VERSION="${CFST_VERSION#v}"
          export CFST_VERSION="$VERSION"
          ./scripts/build-release.sh android

      - name: Upload Android asset
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: build/release/android/cfst-gui-android-release.apk
          if-no-files-found: error

  publish:
    name: Publish Release
    needs:
      - desktop
      - android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: build/release/downloaded

      - name: Resolve release version
        id: version
        env:
          CFST_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          VERSION="${CFST_VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Arrange assets
        run: |
          mkdir -p build/release/desktop build/release/android
          mv build/release/downloaded/cfst-gui-windows-amd64.exe build/release/desktop/
          mv build/release/downloaded/cfst-gui-linux-amd64.tar.gz build/release/desktop/
          mv build/release/downloaded/cfst-gui-darwin-amd64.app.zip build/release/desktop/
          mv build/release/downloaded/cfst-gui-darwin-arm64.app.zip build/release/desktop/
          mv build/release/downloaded/cfst-gui-android-release.apk build/release/android/

      - name: Generate update manifest
        env:
          CFST_VERSION: ${{ steps.version.outputs.version }}
        run: |
          ./scripts/build-release.sh manifest

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CFST-GUI ${{ steps.version.outputs.version }}
          files: |
            build/release/desktop/cfst-gui-windows-amd64.exe
            build/release/desktop/cfst-gui-linux-amd64.tar.gz
            build/release/desktop/cfst-gui-darwin-amd64.app.zip
            build/release/desktop/cfst-gui-darwin-arm64.app.zip
            build/release/android/cfst-gui-android-release.apk
            build/release/cfst-gui-update-manifest.json
          fail_on_unmatched_files: true
