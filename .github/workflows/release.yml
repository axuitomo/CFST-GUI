name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        default: "1.8.5"

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            os: windows-latest
            asset: build/release/desktop/cfst-gui-windows-amd64.exe
          - target: linux-amd64
            os: ubuntu-latest
            asset: build/release/desktop/cfst-gui-linux-amd64.tar.gz
          - target: linux-arm64
            os: ubuntu-latest
            asset: build/release/desktop/cfst-gui-linux-arm64.tar.gz
          - target: darwin-amd64
            os: macos-15-intel
            asset: build/release/desktop/cfst-gui-darwin-amd64.app.zip
          - target: darwin-arm64
            os: macos-15
            asset: build/release/desktop/cfst-gui-darwin-arm64.app.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Set up Windows packaging tools
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsis = Get-Command makensis.exe -ErrorAction SilentlyContinue
          if (-not $nsis) {
            $candidate = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
            if (Test-Path $candidate) {
              $nsis = Get-Item $candidate
            }
          }
          if (-not $nsis) {
            throw "makensis.exe not found after installing NSIS"
          }
          $nsisPath = if ($nsis.Source) { $nsis.Source } else { $nsis.FullName }
          Add-Content $env:GITHUB_PATH (Split-Path $nsisPath)
          $sdkRoot = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          $signTool = Get-ChildItem $sdkRoot -Recurse -Filter SignTool.exe | Where-Object { $_.FullName -match "\\x64\\SignTool.exe$" } | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signTool) {
            throw "Windows SDK SignTool.exe not found"
          }
          Add-Content $env:GITHUB_PATH (Split-Path $signTool.FullName)

      - name: Decode Windows signing certificate
        if: matrix.target == 'windows'
        shell: bash
        env:
          CFST_WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.CFST_WINDOWS_SIGNING_CERT_BASE64 }}
        run: |
          if [ -z "$CFST_WINDOWS_SIGNING_CERT_BASE64" ]; then
            echo "Missing CFST_WINDOWS_SIGNING_CERT_BASE64" >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/cfst-windows"
          echo "$CFST_WINDOWS_SIGNING_CERT_BASE64" | base64 -d > "$RUNNER_TEMP/cfst-windows/cfst-gui.pfx"

      - name: Build desktop asset
        shell: bash
        env:
          CFST_VERSION: ${{ github.event.inputs.version || github.ref_name }}
          CFST_WINDOWS_SIGNING_CERT: ${{ runner.temp }}/cfst-windows/cfst-gui.pfx
          CFST_WINDOWS_SIGNING_PASSWORD: ${{ secrets.CFST_WINDOWS_SIGNING_PASSWORD }}
        run: |
          VERSION="${CFST_VERSION#v}"
          export CFST_VERSION="$VERSION"
          bash scripts/build-release.sh "${{ matrix.target }}"

      - name: Upload desktop asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "cmdline-tools;latest" "platforms;android-37.0" "build-tools;37.0.0" "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260410095206-2cfb76559b7b
          gomobile init

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Decode Android keystore
        env:
          CFST_ANDROID_KEYSTORE_BASE64: ${{ secrets.CFST_ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$CFST_ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing CFST_ANDROID_KEYSTORE_BASE64" >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/cfst-android"
          echo "$CFST_ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/cfst-android/release.jks"

      - name: Build Android asset
        env:
          CFST_VERSION: ${{ github.event.inputs.version || github.ref_name }}
          CFST_ANDROID_KEYSTORE: ${{ runner.temp }}/cfst-android/release.jks
          CFST_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.CFST_ANDROID_KEYSTORE_PASSWORD }}
          CFST_ANDROID_KEY_ALIAS: ${{ secrets.CFST_ANDROID_KEY_ALIAS }}
          CFST_ANDROID_KEY_PASSWORD: ${{ secrets.CFST_ANDROID_KEY_PASSWORD }}
        run: |
          VERSION="${CFST_VERSION#v}"
          export CFST_VERSION="$VERSION"
          bash scripts/build-release.sh android

      - name: Upload Android assets
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: |
            build/release/android/cfst-gui-android-arm64-v8a-release.apk
            build/release/android/cfst-gui-android-armeabi-v7a-release.apk
            build/release/android/cfst-gui-android-release.apk
          if-no-files-found: error

  publish:
    name: Publish Release
    needs:
      - desktop
      - android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: build/release/downloaded

      - name: Resolve release version
        id: version
        env:
          CFST_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          VERSION="${CFST_VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Arrange assets
        run: |
          mkdir -p build/release/desktop build/release/android
          mv build/release/downloaded/cfst-gui-windows-amd64.exe build/release/desktop/
          mv build/release/downloaded/cfst-gui-linux-amd64.tar.gz build/release/desktop/
          mv build/release/downloaded/cfst-gui-linux-arm64.tar.gz build/release/desktop/
          mv build/release/downloaded/cfst-gui-darwin-amd64.app.zip build/release/desktop/
          mv build/release/downloaded/cfst-gui-darwin-arm64.app.zip build/release/desktop/
          mv build/release/downloaded/cfst-gui-android-arm64-v8a-release.apk build/release/android/
          mv build/release/downloaded/cfst-gui-android-armeabi-v7a-release.apk build/release/android/
          mv build/release/downloaded/cfst-gui-android-release.apk build/release/android/

      - name: Generate update manifest
        env:
          CFST_VERSION: ${{ steps.version.outputs.version }}
        run: |
          bash scripts/build-release.sh manifest

      - name: Prepare release notes
        run: |
          NOTES="docs/release-notes/v${{ steps.version.outputs.version }}.md"
          mkdir -p build/release
          if [ -f "$NOTES" ]; then
            cp "$NOTES" build/release/release-notes.md
          else
            printf "CFST-GUI %s\n" "${{ steps.version.outputs.version }}" > build/release/release-notes.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CFST-GUI ${{ steps.version.outputs.version }}
          body_path: build/release/release-notes.md
          files: |
            build/release/desktop/cfst-gui-windows-amd64.exe
            build/release/desktop/cfst-gui-linux-amd64.tar.gz
            build/release/desktop/cfst-gui-linux-arm64.tar.gz
            build/release/desktop/cfst-gui-darwin-amd64.app.zip
            build/release/desktop/cfst-gui-darwin-arm64.app.zip
            build/release/android/cfst-gui-android-arm64-v8a-release.apk
            build/release/android/cfst-gui-android-armeabi-v7a-release.apk
            build/release/android/cfst-gui-android-release.apk
            build/release/cfst-gui-update-manifest.json
          fail_on_unmatched_files: true
