name: Container Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Container version"
        required: false
        default: "1.7.4"

permissions:
  contents: read
  packages: write

jobs:
  ghcr:
    name: Build GHCR image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    env:
      IMAGE_NAME: ghcr.io/axuitomo/cfst-gui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Resolve container version
        id: version
        shell: bash
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${RAW_VERSION:-1.7.4}"
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Container version is empty" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "v_version=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build WebUI Docker context
        env:
          CFST_VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/build-release.sh linux-${{ matrix.arch }}

      - name: Verify Docker context
        run: |
          test -x build/cfst-webui-linux-${{ matrix.arch }}/cfst-webui
          test -f build/cfst-webui-linux-${{ matrix.arch }}/ca-certificates.crt
          test -f build/cfst-webui-linux-${{ matrix.arch }}/Dockerfile
          test -f build/cfst-webui-linux-${{ matrix.arch }}/docker-compose.yml
          test -x build/cfst-webui-linux-${{ matrix.arch }}/run-local.sh
          test -f build/cfst-webui-linux-${{ matrix.arch }}/README.md

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: build/cfst-webui-linux-${{ matrix.arch }}
          platforms: linux/${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          digest="${digest#sha256:}"
          touch "/tmp/digests/$digest"

      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error

  merge:
    name: Publish GHCR manifest
    needs:
      - ghcr
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/axuitomo/cfst-gui
    steps:
      - name: Resolve container version
        id: version
        shell: bash
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${RAW_VERSION:-1.7.4}"
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Container version is empty" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "v_version=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          sources=()
          for digest in *; do
            sources+=("$IMAGE_NAME@sha256:$digest")
          done
          docker buildx imagetools create \
            -t "$IMAGE_NAME:${{ steps.version.outputs.version }}" \
            -t "$IMAGE_NAME:${{ steps.version.outputs.v_version }}" \
            "${sources[@]}"

      - name: Inspect published image
        run: docker buildx imagetools inspect "$IMAGE_NAME:${{ steps.version.outputs.version }}"
